services:

  backend:
    build:
      context: ./backend-fastapi

    container_name: snrt_backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend-fastapi:/app
      - ./storage:/storage

    env_file:
      - .env

    depends_on:
      mongodb:
        condition: service_started

      kafka:
        condition: service_healthy


  audio-worker:

    build:
      context: ./workers/audio-worker

    container_name: snrt_audio_worker

    volumes:
      - ./storage:/storage

    depends_on:
      kafka:
        condition: service_healthy

    restart: always


  mongodb:

    image: mongo:8.0

    container_name: snrt_mongodb

    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db


  kafka:

    image: apache/kafka:latest

    container_name: snrt_kafka

    ports:
      - "9092:9092"

    environment:

      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0


    healthcheck:

      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:9092"
        ]

      interval: 10s

      timeout: 10s

      retries: 10


  tika:
    image: apache/tika:latest

    container_name: snrt_tika

    ports:
      - "9998:9998"

    restart: always


  document-worker:

    build:
      context: ./workers/document-worker

    container_name: snrt_document_worker

    volumes:
      - ./storage:/storage

    depends_on:

      kafka:
        condition: service_healthy

      tika:
        condition: service_started

      mongodb:
        condition: service_started

    restart: always
    
  kafka-ui:

    image: provectuslabs/kafka-ui:latest

    container_name: snrt_kafka_ui

    ports:
      - "8080:8080"

    depends_on:

      kafka:
        condition: service_healthy


    environment:

      KAFKA_CLUSTERS_0_NAME: snrt-cluster

      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092



volumes:

  mongodb_data: