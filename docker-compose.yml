services:

  backend:
    build:
      context: ./backend-fastapi

    container_name: snrt_backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend-fastapi:/app

    env_file:
      - .env

    depends_on:
      - mongodb

  mongodb:
    image: mongo:8.0

    container_name: snrt_mongodb

    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: